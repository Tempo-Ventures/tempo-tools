<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tempo Tools</title>
<meta name="description" content="Internal tools for the Tempo team.">
<style>
  :root {
    --blue:    #044BAF;
    --blue-dk: #033A88;
    --ink:     #0D1117;
    --sub:     #4B5563;
    --muted:   #9CA3AF;
    --line:    #E4E8EF;
    --bg:      #EEF2F7;
    --card:    #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--line);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--blue);
  }

  .header-sep {
    width: 1px;
    height: 18px;
    background: var(--line);
    margin: 0 4px;
  }

  .header-label {
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ── Main ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .page-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 20px;
  }

  /* ── Tool grid ── */
  .tools {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }

  .tool-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px 22px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    position: relative;
  }

  .tool-card:hover {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(4,75,175,0.08), 0 2px 8px rgba(4,75,175,0.06);
    transform: translateY(-1px);
  }

  .tool-card:focus-visible {
    outline: 2px solid var(--blue);
    outline-offset: 2px;
  }

  .tool-icon {
    font-size: 22px;
    line-height: 1;
    margin-bottom: 2px;
  }

  .tool-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -0.01em;
  }

  .tool-desc {
    font-size: 13px;
    color: var(--sub);
    line-height: 1.5;
  }

  .tool-cta {
    margin-top: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tool-cta svg {
    transition: transform 0.15s;
  }

  .tool-card:hover .tool-cta svg {
    transform: translateX(3px);
  }

  /* ── Empty / coming soon card ── */
  .tool-card--soon {
    border-style: dashed;
    cursor: default;
    pointer-events: none;
    opacity: 0.5;
  }

  .tool-card--soon .tool-name,
  .tool-card--soon .tool-cta { color: var(--muted); }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding-bottom: 32px;
  }
</style>
</head>
<body>

<header>
  <img class="logo-mark"
       src="https://storage.googleapis.com/tempo-shared-media/tempo-logo-badge.png"
       alt="Tempo logo">
  <span class="logo-text">Tempo</span>
  <span class="header-sep"></span>
  <span class="header-label">Team tools</span>
</header>

<main>
  <p class="page-title">Tools</p>

  <div class="tools">

    <a class="tool-card" href="email-signature/">
      <div class="tool-icon">✉️</div>
      <div class="tool-name">Email signature</div>
      <div class="tool-desc">Generate your branded Gmail signature — fill in your details, copy, paste.</div>
      <div class="tool-cta">Open
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="#044BAF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <div class="tool-card tool-card--soon">
      <div class="tool-icon">🔜</div>
      <div class="tool-name">More coming</div>
      <div class="tool-desc">Next tools go here once they're ready.</div>
    </div>

  </div>
</main>

<footer>tempo.ooo</footer>

</body>
</html>
